<body>

<canvas id="matrixCanvas"></canvas>

<div class="main-wrapper">

        </div>

        <button class="action-btn" onclick="extractFacebookUID()">Extract Target UID</button>

            <div class="result-title"><i class="fa-solid fa-fingerprint"></i> TARGET UID FOUND SUCCESS</div>

            <a href="https://wa.me/+9779820442753" target="_blank" class="vip-btn whatsapp-link" onclick="playBeep()">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp Contact
            </a>
            <a href="https://www.instagram.com/samir.hero.16" target="_blank" class="vip-btn instagram-link" onclick="playBeep()">
                <i class="fa-brands fa-instagram"></i> Instagram Profile
            </a>
            <a href="https://t.me/Samir_Eraxx" target="_blank" class="vip-btn telegram-link" onclick="playBeep()">
                <i class="fa-brands fa-telegram"></i> Telegram Channel
            </a>
        </div>

<script>
    // MATRIX BACKGROUND EFFECT
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const letters = '0123456789ABCDEF⚡☠★';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(2, 2, 2, 0.08)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillStyle = '#00ff00';
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    function playBeep(freq = 800, duration = 0.08) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    }

    // ADVANCED MULTI-METHOD EXTRACTOR
    function extractFacebookUID() {
        playBeep(900, 0.1);
        let inputVal = document.getElementById('fbLinkInput').value.trim();
        const loading = document.getElementById('loadingState');
        const resultBox = document.getElementById('resultBox');
        const uidOutput = document.getElementById('uidOutput');

        if (!inputVal) {
            alert("⚠️ Error: Please input Facebook Link or Username first!");
            return;
        }

        // METHOD 1: INSTANT LOCAL REGEX SCANNING (No Server Required, Safe from CORS)
        // Checks if UID is explicitly present in the link (e.g., id=1000..., profile.php?id=...)
        let directUidMatch = inputVal.match(/(?:id=|\/profile\.php\?id=)([0-9]+)/) || inputVal.match(/\/posts\/([0-9]+)/) || inputVal.match(/\/permalink\/([0-9]+)/);
        
        if (!inputVal.includes("facebook.com/") && /^\d+$/.test(inputVal)) {
            // If user just typed numbers, it's already a UID
            showSuccess(inputVal);
            return;
        }

        resultBox.style.display = "none";
        loading.style.display = "block";

        if (directUidMatch && directUidMatch[1]) {
            setTimeout(() => { showSuccess(directUidMatch[1]); }, 400);
            return;
        }

        // Clean link format for API
        if (!inputVal.startsWith("http://") && !inputVal.startsWith("https://")) {
            inputVal = "https://" + inputVal;
        }

        // METHOD 2: CORS BYPASS REVERSE PROXY REQUEST
        const targetApi = "https://id.traodoisub.com/api.php";
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetApi);

        // Prepare raw body data structure
        const bodyData = new URLSearchParams();
        bodyData.append('link', inputVal);

        fetch(targetApi, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: bodyData.toString()
        })
        .then(response => {
            if (!response.ok) throw new Error("CORS Blocked");
            return response.json();
        })
        .then(data => {
            if (data && data.id) {
                showSuccess(data.id);
            } else {
                tryLocalFallback(inputVal);
            }
        })
        .catch(err => {
            // If primary fetch fails due to browser CORS, switch to smart local parsing immediately
            tryLocalFallback(inputVal);
        });

        function tryLocalFallback(link) {
            // Clean paths to extract potential numeric usernames
            let cleanUrl = link.split('?')[0].split('&')[0];
            let segments = cleanUrl.split('/');
            let lastSegment = segments[segments.length - 1] || segments[segments.length - 2];
            
            if (lastSegment && /^\d+$/.test(lastSegment) && lastSegment.length >= 10) {
                showSuccess(lastSegment);
            } else {
                loading.style.display = "none";
                alert("❌ Local Filter Alert: Could not pull numerical UID from raw URL structure. Make sure it's a full direct profile link!");
            }
        }

        function showSuccess(uid) {
            loading.style.display = "none";
            playBeep(1200, 0.15);
            uidOutput.innerText = uid;
            resultBox.style.display = "block";
        }
    }

    function copyUID() {
        playBeep(1000, 0.05);
        const text = document.getElementById('uidOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ UID Copied to Clipboard!");
        });
    }
</script>

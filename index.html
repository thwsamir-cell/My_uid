<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMIR DAHIT | UID TOOL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { border: 2px solid #0f0; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 15px #0f0; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #111; border: 1px solid #0f0; color: #0f0; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>

<div class="box">
    <h3>SAMIR DAHIT UID TOOL</h3>
    <input type="text" id="fbInput" placeholder="Paste Profile Link here...">
    <button onclick="directFind()">EXTRACT UID NOW</button>
    <p style="font-size: 12px; margin-top: 20px;">*Yeh tool direct lookup gateway use karta hai.</p>
</div>

<script>
    function directFind() {
        const input = document.getElementById('fbInput').value.trim();
        if(!input) { alert("Link daalo bhai!"); return; }

        // Facebook ke liye sabse fast aur secure lookup gateway
        // Yeh direct query chalata hai, server busy nahi aayega
        const targetUrl = "https://lookup-id.com/#" + encodeURIComponent(input);
        
        // Naye tab mein kholega taaki user ka kaam 100% ho
        window.open(targetUrl, '_blank');
    }
</script>
</body>
</html>
